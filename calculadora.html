<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coinverter | Manual</title>
    <link rel="icon" type="image/png" href="icons/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="full-container">
            <div class="logo-area"><img src="icons/logo.png" class="nav-logo"><span class="logo-text">Coinverter</span></div>
        </div>
    </header>

    <main class="full-content">
        <section class="scanner-section">
            <div class="intro-text"><h1>Conversión Manual</h1><p>Ingresa el monto a convertir.</p></div>
            <div class="input-card"><input type="number" id="manual-input" placeholder="0" autofocus></div>
            <div class="converter-controls">
                <select id="from-currency"><option value="USD">USD</option><option value="ARS" selected>ARS</option></select>
                <img src="icons/conv.png" class="conv-icon">
                <select id="to-currency"><option value="USD" selected>USD</option><option value="ARS">ARS</option></select>
            </div>
            <div class="result-area">
                <span class="label">Monto ingresado</span><div id="result-value" class="value-main">---</div>
                <span class="label">Conversión estimada</span><div id="converted-value" class="value-sub">---</div>
            </div>
            <div class="action-footer"><a href="index.html" class="btn-manual">Regresar al Escáner</a></div>
        </section>
    </main>

    <script>
        const input = document.getElementById('manual-input');
        const resVal = document.getElementById('result-value');
        const convVal = document.getElementById('converted-value');
        const fromC = document.getElementById('from-currency');
        const toC = document.getElementById('to-currency');
        let rates = {};

        function update() {
            const n = parseFloat(input.value);
            if (isNaN(n)) { resVal.innerText = "---"; convVal.innerText = "---"; return; }
            resVal.innerText = n;
            const total = n * (rates[`${fromC.value}_${toC.value}`] || 1);
            convVal.innerText = total.toLocaleString('es-AR', {minimumFractionDigits:2}) + " " + toC.value;
        }

        window.addEventListener('load', () => {
            const rate = parseFloat(localStorage.getItem('rate') || 1000);
            rates = { "USD_ARS": rate, "ARS_USD": 1/rate };
            input.addEventListener('input', update);
            [fromC, toC].forEach(s => s.addEventListener('change', update));
        });
    </script>
</body>
</html>
