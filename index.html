<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coinverter | Scanner Full Area</title>
    <link rel="icon" type="image/png" href="icons/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <header class="navbar">
        <div class="full-container">
            <div class="logo-area"><img src="icons/logo.png" class="nav-logo" alt="logo"><span class="logo-text">Coinverter</span></div>
        </div>
    </header>

    <main class="full-content">
        <section class="scanner-section">
            <div class="intro-text">
                <h1>Conversor de Precios</h1>
                <p>Cualquier número dentro del área será detectado.</p>
            </div>
            
            <div class="camera-card">
                <div class="video-container">
                    <video id="video" autoplay playsinline muted></video>
                    <div class="red-scan-line"></div>
                </div>
            </div>

            <div class="converter-controls">
                <select id="from-currency"><option value="USD">USD</option><option value="ARS" selected>ARS</option></select>
                <img src="icons/conv.png" class="conv-icon" alt="icon">
                <select id="to-currency"><option value="USD" selected>USD</option><option value="ARS">ARS</option></select>
            </div>

            <div class="result-area">
                <span class="label">Monto detectado</span><div id="result-value" class="value-main">---</div>
                <span class="label">Conversión estimada</span><div id="converted-value" class="value-sub">---</div>
                <p id="status" class="status-text">Iniciando...</p>
            </div>
            <div class="action-footer"><a href="calculadora.html" class="btn-manual">Conversión manual</a></div>
        </section>
    </main>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const resVal = document.getElementById('result-value');
        const convVal = document.getElementById('converted-value');
        const statusText = document.getElementById('status');
        const fromC = document.getElementById('from-currency');
        const toC = document.getElementById('to-currency');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let rates = { "USD_ARS": 1000, "ARS_USD": 0.001 };
        let worker = null;

        async function updateRates() {
            const now = new Date().getTime();
            const last = localStorage.getItem('last_upd');
            if (!last || (now - last) > 12 * 60 * 60 * 1000) {
                try {
                    const r = await fetch('https://open.er-api.com/v6/latest/USD');
                    const d = await r.json();
                    localStorage.setItem('rate', d.rates.ARS);
                    localStorage.setItem('last_upd', now);
                } catch(e) {}
            }
            const rate = parseFloat(localStorage.getItem('rate') || 1000);
            rates = { "USD_ARS": rate, "ARS_USD": 1/rate };
        }

        async function initOCR() {
            worker = await Tesseract.createWorker('eng');
            // Permitimos símbolos comunes para que no los confunda con números
            await worker.setParameters({ 
                tessedit_char_whitelist: '0123456789$.', 
                tessedit_pageseg_mode: '7' 
            });
            statusText.innerText = "Escáner Activo";
            
            setInterval(async () => {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    const vW = video.videoWidth;
                    const vH = video.videoHeight;
                    
                    // --- NUEVA LÓGICA: ÁREA TOTAL ---
                    // Tomamos el 100% del ancho y el 30% del alto central del sensor
                    const cropW = vW; 
                    const cropH = vH * 0.3;
                    const cropX = 0;
                    const cropY = vH * 0.35;

                    // Aumentamos resolución para que no pierda detalle al ser ancho
                    canvas.width = cropW; 
                    canvas.height = cropH;
                    
                    ctx.filter = "grayscale(100%) contrast(300%) brightness(110%)";
                    ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, canvas.width, canvas.height);
                    
                    const { data: { text, confidence } } = await worker.recognize(canvas);
                    
                    if (confidence > 50) {
                        const m = text.match(/\d+/); 
                        if (m) {
                            const n = parseFloat(m[0]);
                            resVal.innerText = n;
                            const total = n * (rates[`${fromC.value}_${toC.value}`] || 1);
                            convVal.innerText = total.toLocaleString('es-AR', {minimumFractionDigits:2}) + " " + toC.value;
                        }
                    }
                }
            }, 900);
        }

        window.addEventListener('load', async () => {
            await updateRates();
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1920 } }
            }).then(s => {
                video.srcObject = s; initOCR();
            }).catch(() => statusText.innerText = "Error: Cámara no disponible.");
        });
    </script>
</body>
</html>
