<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coinverter | Scanner</title>

    <!-- ── SEGURIDAD ─────────────────────────────────────────────── -->
    <!-- CSP: permite cámara, scripts de CDN necesarios y AdSense -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src  'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval'
                    https://cdn.jsdelivr.net
                    https://pagead2.googlesyndication.com
                    https://partner.googleadservices.com
                    https://tpc.googlesyndication.com
                    https://www.googletagservices.com
                    https://adservice.google.com
                    https://adservice.google.com.ar
                    https://fonts.googleapis.com;
        style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src    'self' https://fonts.gstatic.com;
        img-src     'self' data: blob: https:;
        connect-src 'self' data: blob:
                    https://cdn.jsdelivr.net
                    https://open.er-api.com
                    https://api.frankfurter.app
                    https://pagead2.googlesyndication.com
                    https://ep1.adtrafficquality.google
                    https://*.googlesyndication.com
                    https://*.googleadservices.com;
        media-src   'self' blob:;
        frame-src   https://googleads.g.doubleclick.net
                    https://tpc.googlesyndication.com;
        worker-src  blob:;
        object-src  'none';
        base-uri    'self';
        form-action 'none';
    ">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    
    <!-- FIX: Permiso de cámara explícito para móviles -->
    <meta http-equiv="Permissions-Policy" content="camera=*, microphone=(), geolocation=()">

    <!-- ── SEO & SOCIAL ──────────────────────────────────────────── -->
    <meta name="description" content="Convertí precios en tiempo real escaneando con tu cámara. ARS, USD y EUR al instante.">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Coinverter | Scanner de Precios">
    <meta property="og:description" content="Escaneá un precio y convertilo a tu moneda al instante.">
    <meta property="og:type" content="website">

    <link rel="icon" type="image/png" href="icons/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="scanner.css">

    <!-- ── TESSERACT OCR ─────────────────────────────────────────── -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <!-- ── GOOGLE ADSENSE ────────────────────────────────────────── -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6290154661573077"
        crossorigin="anonymous"></script>
</head>
<body>

    <!-- ── NAVBAR ─────────────────────────────────────────────────── -->
    <header class="navbar">
        <div class="full-container">
            <div class="logo-area">
                <img src="icons/logo.png" class="nav-logo" alt="Coinverter logo">
                <span class="logo-text">Coinverter</span>
            </div>
        </div>
    </header>

    <main class="full-content">
        <section class="scanner-section">

            <div class="intro-text">
                <h1>Conversor Inteligente</h1>
                <p>Encuadrá el precio y pulsá el botón.</p>
            </div>

            <!-- ── CÁMARA ──────────────────────────────────────────── -->
            <div class="camera-wrapper">
                <video id="video" autoplay playsinline muted></video>
                <img id="frozen-img" alt="frame capturado">
                <div class="vignette"></div>

                <div class="scan-box" id="scan-box">
                    <div class="corner-br"></div>
                    <div class="corner-bl"></div>
                    <div class="scan-line" id="scan-line"></div>
                    <span class="scan-hint">Apuntá el precio aquí</span>
                </div>

                <div class="cam-status-badge" id="cam-badge">Iniciando...</div>

                <div class="processing-overlay" id="proc-overlay">
                    <div class="big-spinner"></div>
                    <span class="processing-text">Leyendo precio...</span>
                </div>

                <!-- Fallback si no hay acceso a cámara -->
                <div class="cam-fallback" id="cam-fallback">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ff3b30" stroke-width="1.5" aria-hidden="true">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                    <p class="cam-fallback-msg" id="cam-fallback-msg">No se pudo acceder a la cámara.</p>
                    <button class="cam-fallback-btn" onclick="retryCameraAccess()">Reintentar</button>
                </div>
            </div>

            <!-- ── BOTÓN SHUTTER ───────────────────────────────────── -->
            <div class="shutter-row">
                <button class="btn-retry" id="btn-retry" onclick="retryCapture()">
                    Reintentar
                </button>
                <button class="btn-shutter" id="btn-shutter" onclick="captureFrame()" disabled aria-label="Capturar precio">
                    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                        <circle cx="12" cy="12" r="8"/>
                    </svg>
                </button>
            </div>
            <div class="shutter-label">ESCANEAR</div>

            <!-- ── SELECTOR DE MONEDAS ─────────────────────────────── -->
            <div class="converter-controls">
                <div class="currency-select-wrap">
                    <span class="currency-label">Desde</span>
                    <select id="from-currency" aria-label="Moneda origen">
                        <option value="ARS" selected>ARS</option>
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                    </select>
                </div>
                <button class="swap-btn" onclick="swapCurrencies()" aria-label="Intercambiar monedas">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
                    </svg>
                </button>
                <div class="currency-select-wrap">
                    <span class="currency-label">Hacia</span>
                    <select id="to-currency" aria-label="Moneda destino">
                        <option value="USD" selected>USD</option>
                        <option value="ARS">ARS</option>
                        <option value="EUR">EUR</option>
                    </select>
                </div>
            </div>

            <!-- ── RESULTADO ───────────────────────────────────────── -->
            <div class="result-area" aria-live="polite">
                <div class="result-row">
                    <div class="result-col">
                        <span class="label">Monto detectado</span>
                        <span class="value-from" id="result-value">---</span>
                    </div>
                    <span class="currency-tag" id="from-tag">ARS</span>
                </div>
                <div class="result-divider"></div>
                <div class="result-row">
                    <div class="result-col">
                        <span class="label">Conversión estimada</span>
                        <span class="value-to" id="converted-value">---</span>
                    </div>
                    <span class="currency-tag" id="to-tag">USD</span>
                </div>
            </div>

            <!-- ── ESPACIO PARA ANUNCIO ────────────────────────────── -->
            <div class="ad-slot" aria-label="Publicidad">
                <ins class="adsbygoogle"
                    style="display:block"
                    data-ad-client="ca-pub-6290154661573077"
                    data-ad-slot="auto"
                    data-ad-format="auto"
                    data-full-width-responsive="true"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>

            <!-- ── FOOTER ──────────────────────────────────────────── -->
            <div class="action-footer">
                <a href="calculadora.html" class="btn-manual">Ingresar manualmente</a>
            </div>

        </section>
    </main>

    <canvas id="canvas" style="display:none;" aria-hidden="true"></canvas>

    <script src="scanner.js"></script>
</body>
</html>
