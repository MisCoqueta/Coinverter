<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coinverter | Pro Scanner</title>
    <link rel="icon" type="image/png" href="icons/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <header class="navbar">
        <div class="full-container">
            <div class="logo-area"><img src="icons/logo.png" class="nav-logo" alt="Logo"><span class="logo-text">Coinverter</span></div>
        </div>
    </header>

    <main class="full-content">
        <section class="scanner-section">
            <div class="intro-text">
                <h1>Conversor de Precios</h1>
                <p>Encuadra el precio. Los símbolos serán ignorados.</p>
            </div>
            
            <div class="camera-card">
                <div class="video-container">
                    <video id="video" autoplay playsinline muted></video>
                    <div class="red-scan-line"></div>
                </div>
            </div>

            <div class="converter-controls">
                <select id="from-currency"><option value="USD">USD</option><option value="ARS" selected>ARS</option></select>
                <img src="icons/conv.png" class="conv-icon" alt="to">
                <select id="to-currency"><option value="USD" selected>USD</option><option value="ARS">ARS</option></select>
            </div>

            <div class="result-area">
                <span class="label">Monto detectado</span><div id="result-value" class="value-main">---</div>
                <span class="label">Conversión estimada</span><div id="converted-value" class="value-sub">---</div>
                <p id="status" class="status-text">Iniciando inteligencia...</p>
            </div>
            <div class="action-footer"><a href="calculadora.html" class="btn-manual">Conversión manual</a></div>
        </section>
    </main>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const resVal = document.getElementById('result-value');
        const convVal = document.getElementById('converted-value');
        const statusText = document.getElementById('status');
        const fromC = document.getElementById('from-currency');
        const toC = document.getElementById('to-currency');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let rates = { "USD_ARS": 1000, "ARS_USD": 0.001 };
        let worker = null;

        function applyExtremeFilters(context, w, h) {
            const imgData = context.getImageData(0, 0, w, h);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                const brightness = (data[i] * 0.34) + (data[i + 1] * 0.5) + (data[i + 2] * 0.16);
                const v = brightness < 130 ? 0 : 255; // Umbral de binarización
                data[i] = data[i+1] = data[i+2] = v;
            }
            context.putImageData(imgData, 0, 0);
        }

        async function updateRates() {
            const now = new Date().getTime();
            const last = localStorage.getItem('last_upd');
            if (!last || (now - last) > 12 * 60 * 60 * 1000) {
                try {
                    const r = await fetch('https://open.er-api.com/v6/latest/USD');
                    const d = await r.json();
                    localStorage.setItem('rate', d.rates.ARS);
                    localStorage.setItem('last_upd', now);
                } catch(e) {}
            }
            const rate = parseFloat(localStorage.getItem('rate') || 1000);
            rates = { "USD_ARS": rate, "ARS_USD": 1/rate };
        }

        async function initOCR() {
            worker = await Tesseract.createWorker('eng');
            // CAMBIO CLAVE: Incluimos el símbolo $ en la lista permitida para que la IA lo reconozca como tal
            // y no intente "convertirlo" en un 5 o un 8.
            await worker.setParameters({ 
                tessedit_char_whitelist: '0123456789$.', 
                tessedit_pageseg_mode: '7' 
            });
            statusText.innerText = "Escáner Activo";
            statusText.style.color = "#32d74b";
            
            setInterval(async () => {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    const vW = video.videoWidth;
                    const vH = video.videoHeight;
                    const cropW = vW * 0.6; const cropH = vH * 0.2;
                    const cropX = vW * 0.2; const cropY = vH * 0.4;

                    canvas.width = cropW * 4; canvas.height = cropH * 4;
                    ctx.filter = "contrast(400%) brightness(110%)";
                    ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, canvas.width, canvas.height);
                    applyExtremeFilters(ctx, canvas.width, canvas.height);
                    
                    const { data: { text, confidence } } = await worker.recognize(canvas);
                    
                    if (confidence > 60) {
                        // EXPRESIÓN REGULAR MEJORADA: 
                        // Buscamos solo los números dentro de la cadena detectada
                        const match = text.match(/\d+/); 
                        if (match) {
                            const n = parseFloat(match[0]);
                            resVal.innerText = n;
                            const total = n * (rates[`${fromC.value}_${toC.value}`] || 1);
                            convVal.innerText = total.toLocaleString('es-AR', {minimumFractionDigits:2}) + " " + toC.value;
                        }
                    }
                }
            }, 800);
        }

        window.addEventListener('load', async () => {
            await updateRates();
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1920 } }
            }).then(s => {
                video.srcObject = s; 
                initOCR();
            }).catch(() => statusText.innerText = "Error: Cámara no disponible.");
        });
    </script>
</body>
</html>
