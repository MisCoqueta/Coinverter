<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coinverter | Ultra Precision</title>
    <link rel="icon" type="image/png" href="icons/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

    <header class="navbar">
        <div class="full-container">
            <div class="logo-area"><img src="icons/logo.png" class="nav-logo"><span class="logo-text">Coinverter</span></div>
        </div>
    </header>

    <main class="full-content">
        <section class="scanner-section">
            <div class="intro-text">
                <h1>Escáner de Precisión</h1>
                <p>Mantén el número quieto y evita reflejos de luz.</p>
            </div>

            <div class="camera-card">
                <div class="video-container">
                    <video id="video" autoplay playsinline muted></video>
                    <div class="red-scan-line"></div>
                </div>
            </div>

            <div class="converter-controls">
                <select id="from-currency"><option value="USD">USD</option><option value="ARS" selected>ARS</option></select>
                <img src="icons/conv.png" class="conv-icon">
                <select id="to-currency"><option value="USD" selected>USD</option><option value="ARS">ARS</option></select>
            </div>

            <div class="result-area">
                <span class="label">Monto detectado</span>
                <div id="result-value" class="value-main">---</div>
                <span class="label">Conversión estimada</span>
                <div id="converted-value" class="value-sub">---</div>
                <p id="status" class="status-text">Iniciando cámara...</p>
            </div>

            <div class="action-footer"><a href="calculadora.html" class="btn-manual">Conversión manual</a></div>
        </section>
    </main>

    <!-- Canvas para procesar la imagen -->
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const resVal = document.getElementById('result-value');
        const convVal = document.getElementById('converted-value');
        const statusText = document.getElementById('status');
        const fromC = document.getElementById('from-currency');
        const toC = document.getElementById('to-currency');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let exchangeRates = { "USD_ARS": 1000, "ARS_USD": 0.001 };
        let worker = null;

        // PRE-PROCESAMIENTO: Convierte la imagen a Blanco y Negro puro
        function preprocessImage(context, width, height) {
            const imageData = context.getImageData(0, 0, width, height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                // Promedio de color para gris
                const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                // Umbral (Threshold): Si es más oscuro que 120, se vuelve negro (0), si no blanco (255)
                const threshold = avg < 120 ? 0 : 255;
                data[i] = data[i+1] = data[i+2] = threshold;
            }
            context.putImageData(imageData, 0, 0);
        }

        async function updateRates() {
            try {
                const r = await fetch('https://open.er-api.com/v6/latest/USD');
                const d = await r.json();
                const rate = d.rates.ARS;
                localStorage.setItem('rate', rate);
                exchangeRates = { "USD_ARS": rate, "ARS_USD": 1/rate };
            } catch(e) {
                const saved = parseFloat(localStorage.getItem('rate') || 1000);
                exchangeRates = { "USD_ARS": saved, "ARS_USD": 1/saved };
            }
        }

        async function initOCR() {
            statusText.innerText = "Sintonizando IA...";
            worker = await Tesseract.createWorker('eng');
            await worker.setParameters({
                tessedit_char_whitelist: '0123456789',
                tessedit_pageseg_mode: '7', // Modo línea única
            });
            statusText.innerText = "Escáner Listo";
            statusText.style.color = "#32d74b";
            processLoop();
        }

        async function processLoop() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const vW = video.videoWidth;
                const vH = video.videoHeight;

                // Recorte de la franja central
                const cropW = vW * 0.6;
                const cropH = vH * 0.15;
                const cropX = vW * 0.2;
                const cropY = vH * 0.42;

                // Dibujar 3 veces más grande para mejorar nitidez
                canvas.width = cropW * 2;
                canvas.height = cropH * 2;

                ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, canvas.width, canvas.height);
                
                // Aplicar limpieza de imagen
                preprocessImage(ctx, canvas.width, canvas.height);

                const { data: { text, confidence } } = await worker.recognize(canvas);
                
                // SOLO si tiene confianza alta (> 80) mostramos el número
                if (confidence > 80) {
                    const match = text.trim().match(/\d+/);
                    if (match) {
                        const n = parseFloat(match[0]);
                        resVal.innerText = n;
                        const total = n * (exchangeRates[`${fromC.value}_${toC.value}`] || 1);
                        convVal.innerText = total.toLocaleString('es-AR', {minimumFractionDigits:2}) + " " + toC.value;
                    }
                }
            }
            setTimeout(processLoop, 600);
        }

        window.addEventListener('load', async () => {
            await updateRates();
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1280 } }
            }).then(s => {
                video.srcObject = s;
                initOCR();
            }).catch(() => statusText.innerText = "Error: Cámara no disponible.");
        });
    </script>
</body>
</html>
