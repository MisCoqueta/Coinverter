<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coinverter | Scanner</title>

    <!-- ICONO EN PESTAÑA -->
    <link rel="icon" type="image/png" href="icons/logo.png">
    <link rel="apple-touch-icon" href="icons/logo.png">

    <!-- FUENTE ROBOTO -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- ESTILOS -->
    <link rel="stylesheet" href="style.css">

    <!-- LIBRERÍA OCR (Tesseract.js) -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

    <header class="navbar">
        <div class="full-container">
            <div class="logo-area">
                <img src="icons/logo.png" alt="Logo" class="nav-logo">
                <span class="logo-text">Coinverter</span>
            </div>
            <nav class="menu">
                <a href="#" class="active">Scanner</a>
            </nav>
        </div>
    </header>

    <main class="full-content">
        <section class="scanner-section">
            <div class="text-header">
                <h1>Escáner Inteligente</h1>
                <p>Apunta con la cámara a los números para leerlos.</p>
            </div>

            <!-- RECTÁNGULO DE LA CÁMARA -->
            <div class="camera-card">
                <div class="video-container">
                    <video id="video" autoplay playsinline muted></video>
                    <!-- Guía visual de enfoque -->
                    <div class="scan-guide">
                        <div class="scan-line"></div>
                    </div>
                </div>
            </div>

            <!-- RESULTADO DE LECTURA -->
            <div class="result-area">
                <span class="result-label">Número detectado</span>
                <div id="result-value" class="result-value">---</div>
                <p id="status" class="status-text">Cargando cámara...</p>
            </div>
        </section>
    </main>

    <!-- Canvas oculto para procesar imágenes -->
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const resultValue = document.getElementById('result-value');
        const statusText = document.getElementById('status');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        async function startCamera() {
            // VERIFICACIÓN DE SEGURIDAD (Cámara solo funciona en localhost o HTTPS)
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                statusText.innerText = "Error: Acceso denegado. USA 'localhost' O HTTPS.";
                statusText.style.color = "#ff453a";
                return;
            }

            try {
                const constraints = {
                    video: {
                        facingMode: "environment", // Cámara trasera
                        width: { ideal: 640 },
                        height: { ideal: 640 }
                    }
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    statusText.innerText = "Cámara lista. Iniciando motor...";
                    initOCR();
                };
            } catch (err) {
                console.error(err);
                statusText.innerText = "Error: Revisa los permisos de cámara.";
                statusText.style.color = "#ff453a";
            }
        }

        async function initOCR() {
            try {
                // Crear el trabajador de Tesseract
                const worker = await Tesseract.createWorker('eng');
                
                // Configurar para que SOLO lea números y puntos
                await worker.setParameters({
                    tessedit_char_whitelist: '0123456789.',
                });

                statusText.innerText = "Escaneando...";
                statusText.style.color = "#32d74b";

                // Escanear cada 1.5 segundos
                setInterval(async () => {
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                        const { data: { text } } = await worker.recognize(canvas);
                        const cleanText = text.replace(/[^0-9.]/g, '').trim();
                        
                        if (cleanText.length > 0) {
                            resultValue.innerText = cleanText;
                        }
                    }
                }, 1500);
            } catch (e) {
                console.error(e);
                statusText.innerText = "Error en el motor de lectura.";
            }
        }

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
