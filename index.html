<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coinverter | Scanner</title>
    <link rel="icon" type="image/png" href="icons/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Cargamos Tesseract desde un CDN confiable -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

    <header class="navbar">
        <div class="full-container">
            <div class="logo-area">
                <img src="icons/logo.png" class="nav-logo" alt="Logo">
                <span class="logo-text">Coinverter</span>
            </div>
        </div>
    </header>

    <main class="full-content">
        <section class="scanner-section">
            <div class="intro-text">
                <h1>Conversor de Precios</h1>
                <p>Encuadra el número en el centro.</p>
            </div>

            <div class="camera-card">
                <div class="video-container">
                    <video id="video" autoplay playsinline muted></video>
                    <div class="red-scan-line"></div>
                </div>
            </div>

            <div class="converter-controls">
                <select id="from-currency">
                    <option value="USD">USD</option>
                    <option value="ARS" selected>ARS</option>
                </select>
                <img src="icons/conv.png" class="conv-icon" alt="converter">
                <select id="to-currency">
                    <option value="USD" selected>USD</option>
                    <option value="ARS">ARS</option>
                </select>
            </div>

            <div class="result-area">
                <span class="label">Monto detectado</span>
                <div id="result-value" class="value-main">---</div>
                <span class="label">Conversión estimada</span>
                <div id="converted-value" class="value-sub">---</div>
                <p id="status" class="status-text">Iniciando cámara...</p>
            </div>

            <div class="action-footer">
                <a href="calculadora.html" class="btn-manual">Conversión manual</a>
            </div>
        </section>
    </main>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const resVal = document.getElementById('result-value');
        const convVal = document.getElementById('converted-value');
        const statusText = document.getElementById('status');
        const fromC = document.getElementById('from-currency');
        const toC = document.getElementById('to-currency');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let exchangeRates = { "USD_ARS": 1000, "ARS_USD": 0.001 };
        let worker = null;
        let active = false;

        // 1. Obtener tasas de cambio
        async function updateRates() {
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await response.json();
                const rate = data.rates.ARS;
                localStorage.setItem('rate', rate);
                exchangeRates = { "USD_ARS": rate, "ARS_USD": 1/rate };
                console.log("Tasas actualizadas:", rate);
            } catch(e) {
                const saved = parseFloat(localStorage.getItem('rate') || 1000);
                exchangeRates = { "USD_ARS": saved, "ARS_USD": 1/saved };
            }
        }

        // 2. Iniciar Cámara (Prioridad Máxima)
        async function startCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                statusText.innerText = "Error: Tu navegador bloquea la cámara (requiere HTTPS).";
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;
                statusText.innerText = "Cámara activa. Cargando motor...";
                
                // Una vez abierta la cámara, preparamos el OCR
                initOCR();
            } catch (err) {
                statusText.innerText = "Error: No se pudo acceder a la cámara.";
                console.error(err);
            }
        }

        // 3. Iniciar Tesseract
        async function initOCR() {
            try {
                worker = await Tesseract.createWorker('eng');
                await worker.setParameters({
                    tessedit_char_whitelist: '0123456789',
                    tessedit_pageseg_mode: '13',
                });
                statusText.innerText = "Escáner listo";
                statusText.style.color = "#32d74b";
                active = true;
                processFrame();
            } catch (e) {
                statusText.innerText = "Error al cargar el motor OCR.";
            }
        }

        // 4. Procesar fotogramas
        async function processFrame() {
            if (!active) return;

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // Recorte de área central (60% ancho, 20% alto)
                const vW = video.videoWidth;
                const vH = video.videoHeight;
                canvas.width = vW * 0.6;
                canvas.height = vH * 0.2;
                
                ctx.filter = "grayscale(100%) contrast(300%)";
                ctx.drawImage(video, vW * 0.2, vH * 0.4, vW * 0.6, vH * 0.2, 0, 0, canvas.width, canvas.height);

                const { data: { text } } = await worker.recognize(canvas);
                const match = text.trim().match(/\d+/);
                
                if (match) {
                    const n = parseFloat(match[0]);
                    resVal.innerText = n;
                    const pair = `${fromC.value}_${toC.value}`;
                    const total = n * (exchangeRates[pair] || 1);
                    convVal.innerText = total.toLocaleString('es-AR', {minimumFractionDigits:2}) + " " + toC.value;
                }
            }
            // Pequeña pausa para no saturar el procesador
            setTimeout(processFrame, 800);
        }

        window.addEventListener('load', () => {
            updateRates().then(startCamera);
        });
    </script>
</body>
</html>
