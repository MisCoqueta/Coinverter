<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coinverter | Scanner</title>
    <link rel="icon" type="image/png" href="icons/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <header class="navbar">
        <div class="full-container">
            <div class="logo-area"><img src="icons/logo.png" class="nav-logo"><span class="logo-text">Coinverter</span></div>
        </div>
    </header>

    <main class="full-content">
        <section class="scanner-section">
            <div class="intro-text"><h1>Conversor Inteligente</h1><p>Apunta con la cámara a un precio.</p></div>
            <div class="camera-card"><div class="video-container"><video id="video" autoplay playsinline muted></video><div class="red-scan-line"></div></div></div>
            <div class="converter-controls">
                <select id="from-currency"><option value="USD">USD</option><option value="ARS" selected>ARS</option></select>
                <img src="icons/conv.png" class="conv-icon">
                <select id="to-currency"><option value="USD" selected>USD</option><option value="ARS">ARS</option></select>
            </div>
            <div class="result-area">
                <span class="label">Monto Detectado</span><div id="result-value" class="value-main">---</div>
                <span class="label">Conversión Estimada</span><div id="converted-value" class="value-sub">---</div>
                <p id="status" class="status-text">Iniciando cámara...</p>
            </div>
            <div class="action-footer"><a href="calculadora.html" class="btn-manual">Conversión Manual</a></div>
        </section>
    </main>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const resVal = document.getElementById('result-value');
        const convVal = document.getElementById('converted-value');
        const statusText = document.getElementById('status');
        const fromC = document.getElementById('from-currency');
        const toC = document.getElementById('to-currency');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let exchangeRates = { "USD_ARS": 1000, "ARS_USD": 0.001 };

        async function updateRates() {
            const now = new Date().getTime();
            const last = localStorage.getItem('last_upd');
            if (!last || (now - last) > 12 * 60 * 60 * 1000) {
                try {
                    const r = await fetch('https://open.er-api.com/v6/latest/USD');
                    const d = await r.json();
                    localStorage.setItem('rate', d.rates.ARS);
                    localStorage.setItem('last_upd', now);
                } catch(e) {}
            }
            const rate = parseFloat(localStorage.getItem('rate') || 1000);
            exchangeRates = { "USD_ARS": rate, "ARS_USD": 1/rate };
        }

        async function initOCR() {
            const worker = await Tesseract.createWorker('eng');
            await worker.setParameters({ tessedit_char_whitelist: '0123456789', tessedit_pageseg_mode: '7' });
            statusText.innerText = "Listo para Escanear";
            setInterval(async () => {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                    ctx.filter = "grayscale(1) contrast(2.5)";
                    ctx.drawImage(video, 0, 0);
                    const { data: { text } } = await worker.recognize(canvas);
                    const m = text.trim().match(/\d+/);
                    if (m) {
                        const n = parseFloat(m[0]);
                        resVal.innerText = n;
                        const total = n * (exchangeRates[`${fromC.value}_${toC.value}`] || 1);
                        convVal.innerText = total.toLocaleString('es-AR', {minimumFractionDigits:2}) + " " + toC.value;
                    }
                }
            }, 1000);
        }

        window.addEventListener('load', async () => {
            await updateRates();
            navigator.mediaDevices.getUserMedia({video: {facingMode:"environment"}}).then(s => {
                video.srcObject = s; initOCR();
            });
        });
    </script>
</body>
</html>
