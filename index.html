<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coinverter | Pro Scanner</title>
    <link rel="icon" type="image/png" href="icons/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <header class="navbar">
        <div class="full-container">
            <div class="logo-area"><img src="icons/logo.png" class="nav-logo"><span class="logo-text">Coinverter</span></div>
        </div>
    </header>

    <main class="full-content">
        <section class="scanner-section">
            <div class="intro-text">
                <h1>Escáner de Alta Precisión</h1>
                <p>Detecta fuentes complejas y diseños artísticos.</p>
            </div>
            
            <div class="camera-card">
                <div class="video-container">
                    <video id="video" autoplay playsinline muted></video>
                    <div class="red-scan-line"></div>
                </div>
            </div>

            <div class="converter-controls">
                <select id="from-currency"><option value="USD">USD</option><option value="ARS" selected>ARS</option></select>
                <img src="icons/conv.png" class="conv-icon">
                <select id="to-currency"><option value="USD" selected>USD</option><option value="ARS">ARS</option></select>
            </div>

            <div class="result-area">
                <span class="label">Monto detectado</span><div id="result-value" class="value-main">---</div>
                <span class="label">Conversión estimada</span><div id="converted-value" class="value-sub">---</div>
                <p id="status" class="status-text">Cargando inteligencia...</p>
            </div>
            <div class="action-footer"><a href="calculadora.html" class="btn-manual">Conversión manual</a></div>
        </section>
    </main>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const resVal = document.getElementById('result-value');
        const convVal = document.getElementById('converted-value');
        const statusText = document.getElementById('status');
        const fromC = document.getElementById('from-currency');
        const toC = document.getElementById('to-currency');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let rates = { "USD_ARS": 1000, "ARS_USD": 0.001 };
        let worker = null;

        // FUNCIÓN DE PROCESAMIENTO AVANZADO DE PÍXELES
        function applyExtremeFilters(context, w, h) {
            const imgData = context.getImageData(0, 0, w, h);
            const data = imgData.data;
            
            for (let i = 0; i < data.length; i += 4) {
                // Convertir a escala de grises pesada
                const brightness = (data[i] * 0.34) + (data[i + 1] * 0.5) + (data[i + 2] * 0.16);
                
                // Umbralización adaptativa simple: 
                // Si el píxel es oscuro, lo forzamos a negro puro. Si es claro, blanco puro.
                const v = brightness < 125 ? 0 : 255;
                
                data[i] = v;     // R
                data[i + 1] = v; // G
                data[i + 2] = v; // B
            }
            context.putImageData(imgData, 0, 0);
        }

        async function updateRates() {
            try {
                const r = await fetch('https://open.er-api.com/v6/latest/USD');
                const d = await r.json();
                localStorage.setItem('rate', d.rates.ARS);
                rates = { "USD_ARS": d.rates.ARS, "ARS_USD": 1/d.rates.ARS };
            } catch(e) {
                const saved = parseFloat(localStorage.getItem('rate') || 1480);
                rates = { "USD_ARS": saved, "ARS_USD": 1/saved };
            }
        }

        async function initOCR() {
            worker = await Tesseract.createWorker('eng');
            await worker.setParameters({ 
                tessedit_char_whitelist: '0123456789', 
                tessedit_pageseg_mode: '7' 
            });
            statusText.innerText = "Escáner Activo";
            statusText.style.color = "#32d74b";
            
            setInterval(async () => {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    const vW = video.videoWidth;
                    const vH = video.videoHeight;
                    
                    // Área de interés (Centro)
                    const cropW = vW * 0.6;
                    const cropH = vH * 0.2;
                    const cropX = vW * 0.2;
                    const cropY = vH * 0.4;

                    // Agrandamos x4 para que la IA vea fuentes delgadas o extrañas con claridad
                    canvas.width = cropW * 4; 
                    canvas.height = cropH * 4;
                    
                    // Paso 1: Dibujar con filtros de nitidez
                    ctx.filter = "contrast(400%) brightness(110%) blur(0px)";
                    ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, canvas.width, canvas.height);
                    
                    // Paso 2: Limpieza de píxeles manual (Binarización)
                    applyExtremeFilters(ctx, canvas.width, canvas.height);
                    
                    const { data: { text, confidence } } = await worker.recognize(canvas);
                    
                    // Solo aceptar si la confianza es decente para evitar "falsos positivos"
                    if (confidence > 50) {
                        const numbersOnly = text.replace(/[^0-9]/g, '');
                        if (numbersOnly.length > 0) {
                            const n = parseFloat(numbersOnly);
                            resVal.innerText = n;
                            const total = n * (rates[`${fromC.value}_${toC.value}`] || 1);
                            convVal.innerText = total.toLocaleString('es-AR', {minimumFractionDigits:2}) + " " + toC.value;
                        }
                    }
                }
            }, 800); // Un poco más rápido que un segundo
        }

        window.addEventListener('load', async () => {
            await updateRates();
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1920 } }
            }).then(s => {
                video.srcObject = s; 
                initOCR();
            }).catch(() => statusText.innerText = "Error: Cámara no disponible.");
        });
    </script>
</body>
</html>
