<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coinverter</title>
    <link rel="icon" type="image/png" href="icons/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

<header class="navbar">
    <div class="full-container">
        <div class="logo-area">
            <img src="icons/logo.png" class="nav-logo">
            <span class="logo-text">Coinverter</span>
        </div>
    </div>
</header>

<main class="full-content">
    <section class="scanner-section">
        <div class="intro-text">
            <h1>Conversor de Precios</h1>
            <p>Encuadra el precio en la línea roja.</p>
        </div>

        <div class="camera-card">
            <div class="video-container">
                <video id="video" autoplay playsinline muted></video>
                <div class="red-scan-line"></div>
                <div id="guide" class="focus-guide"></div>
            </div>
        </div>

        <div class="converter-controls">
            <select id="from-currency">
                <option value="USD">USD</option>
                <option value="ARS" selected>ARS</option>
            </select>
            <img src="icons/conv.png" class="conv-icon">
            <select id="to-currency">
                <option value="USD" selected>USD</option>
                <option value="ARS">ARS</option>
            </select>
        </div>

        <div class="result-area">
            <span class="label">Monto detectado</span>
            <div id="result-value" class="value-main">---</div>

            <span class="label">Conversión estimada</span>
            <div id="converted-value" class="value-sub">---</div>

            <p id="status" style="font-size:10px; color:#86868b; margin-top:10px;">
                Iniciando cámara...
            </p>
        </div>

        <div class="action-footer">
            <a href="calculadora.html" class="btn-manual">Conversión manual</a>
        </div>
    </section>
</main>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const video = document.getElementById('video');
const resVal = document.getElementById('result-value');
const convVal = document.getElementById('converted-value');
const fromC = document.getElementById('from-currency');
const toC = document.getElementById('to-currency');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let rates = { "USD_ARS": 1000, "ARS_USD": 0.001 };
let worker = null;

// ================== CAMBIO DE COTIZACIÓN ==================
async function updateRates() {
    try {
        const r = await fetch('https://open.er-api.com/v6/latest/USD');
        const d = await r.json();
        rates = {
            "USD_ARS": d.rates.ARS,
            "ARS_USD": 1 / d.rates.ARS
        };
    } catch {
        rates = { "USD_ARS": 1000, "ARS_USD": 0.001 };
    }
}

// ================== OCR ==================
async function initOCR() {
    worker = await Tesseract.createWorker();

    await worker.loadLanguage('eng');
    await worker.initialize('eng');

    await worker.setParameters({
        tessedit_char_whitelist: '0123456789',
        tessedit_pageseg_mode: '8',
        classify_bln_numeric_mode: 1
    });

    document.getElementById('status').innerText = "Escáner activo";

    setInterval(async () => {
        if (video.readyState !== video.HAVE_ENOUGH_DATA) return;

        const cropW = video.videoWidth * 0.7;
        const cropH = video.videoHeight * 0.2;
        const sx = (video.videoWidth - cropW) / 2;
        const sy = (video.videoHeight - cropH) / 2;

        canvas.width = cropW;
        canvas.height = cropH;

        ctx.filter = "grayscale(1) contrast(3) brightness(1.2)";
        ctx.drawImage(video, sx, sy, cropW, cropH, 0, 0, cropW, cropH);

        // BINARIZACIÓN
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < img.data.length; i += 4) {
            const avg = (img.data[i] + img.data[i+1] + img.data[i+2]) / 3;
            const v = avg > 140 ? 255 : 0;
            img.data[i] = img.data[i+1] = img.data[i+2] = v;
        }
        ctx.putImageData(img, 0, 0);

        const { data: { text } } = await worker.recognize(canvas);
        const clean = text.replace(/[^0-9]/g, '');

        if (clean.length < 2 || clean.length > 7) return;

        const n = parseInt(clean, 10);
        if (n <= 0 || n > 10000000) return;

        resVal.innerText = n.toLocaleString('es-AR');

        const total = n * (rates[`${fromC.value}_${toC.value}`] || 1);
        convVal.innerText =
            total.toLocaleString('es-AR', { minimumFractionDigits: 2 }) +
            " " + toC.value;

    }, 1000);
}

// ================== INIT ==================
window.addEventListener('load', async () => {
    await updateRates();
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
    });
    video.srcObject = stream;
    initOCR();
});
</script>

</body>
</html>
